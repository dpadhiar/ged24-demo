apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations: |
    numaplane.numaproj.io/PipelineRollout:
      health.lua: |
        hs = {}
        healthyCondition = {}
        pipelinePaused = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "ChildResourcesHealthy" then
                healthyCondition = condition
              end
              if condition.type == "PipelinePausingOrPaused" then
                pipelinePaused = condition
              end
            end
          end
        end
        if healthyCondition.status == "False" or obj.metadata.generation ~= obj.status.observedGeneration then
          hs.status = "Progressing"
          hs.message = "Waiting for Pipeline status"
          return hs
        end
        if pipelinePaused.status == "True" and obj.metadata.generation == obj.status.observedGeneration then
          hs.status = "Suspended"
          hs.message = pipelinePaused.message
          return hs
        end
        if healthyCondition.status == "True" and obj.metadata.generation == obj.status.observedGeneration then
          hs.status = "Healthy"
          hs.message = healthyCondition.message
          return hs
        end
        hs.status = "Degraded"
        hs.message = healthyCondition.message
        return hs

    numaplane.numaproj.io/ISBServiceRollout:
      health.lua: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "ChildResourcesHealthy" and condition.status == "True" and obj.metadata.generation == obj.status.observedGeneration then
                hs.status = "Healthy"
                hs.message = condition.message
                return hs
              end
              if condition.type == "ChildResourcesHealthy" and condition.status == "False" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
              if condition.type == "ChildResourcesHealthy" and condition.status == "Unknown" then
                hs.status = "Degraded"
                hs.message = condition.message
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for ISBService status"
        return hs
    numaplane.numaproj.io/NumaflowControllerRollout:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        hs.message = "All good!"
        return hs
